kind = "web"
previewPath = "/"
title = "AgroLens"
version = "1.0.0"
id = "artifacts/agrolens"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21485

[services.development]
run = "pnpm --filter @workspace/agrolens run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agrolens", "run", "build" ]
publicDir = "artifacts/agrolens/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21485"
BASE_PATH = "/"
